<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
   
    <a href="index.html">Home</a> 

    <form action="contato.php" method="get">
    <div>
        <label for="campo-nome">Nome</label>
        <input type="text" id="campo-nome" name="nome">
    </div>

    <div>
        <label for="campo-data-nascimento">Data de Nascimento</label>
        <input type="date" id="campo-data-nascimento" name="data_nascimento" max="2026-03-13"> <!-- O HTML ñ é capaz de calcular a data atual, ele ñ inteligente por si só, para automatizar isso é necessárrio JS -->
    </div>

    <div>
        <label for="campo-email">E-mail</label>
        <input type="email" id="campo-email" name="email">
    </div>

    <div>
        <label for="campo-senha">Senha</label>
        <input type="password" id="campo-senha" name="senha">
    </div>

        <button type="submit">Registrar Contato</button>
    </form>
</body>
</html>
